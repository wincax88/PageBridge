services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pagebridge
      POSTGRES_PASSWORD: pagebridge
      POSTGRES_DB: pagebridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagebridge -d pagebridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pagebridge
      MINIO_ROOT_PASSWORD: pagebridge-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://minio:9000 pagebridge pagebridge-secret; do sleep 2; done &&
      mc mb --ignore-existing local/pagebridge &&
      printf "%s" "[{\"AllowedOrigins\":[\"http://localhost:5173\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\",\"DELETE\",\"HEAD\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\"]}]" > /tmp/pagebridge-cors.json &&
      mc cors set local/pagebridge /tmp/pagebridge-cors.json &&
      mc anonymous set none local/pagebridge
      '

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 4000
      WEB_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://pagebridge:pagebridge@postgres:5432/pagebridge?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: pagebridge
      S3_ACCESS_KEY_ID: pagebridge
      S3_SECRET_ACCESS_KEY: pagebridge-secret
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
